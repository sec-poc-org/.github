name: Reusable Trivy Image Scan

on:
  workflow_call:
    inputs:
      dockerfile-path:
        type: string
        default: 'Dockerfile'
      build-context:
        type: string
        default: '.'
      severity:
        type: string
        default: 'HIGH,CRITICAL'
      fail-on-findings:
        type: boolean
        default: false
      app-owner:
        type: string
        default: ''
        description: GitHub org/user owning the App; leave empty to skip token minting
      app-repositories:
        type: string
        default: ''
        description: Newline-separated repos for the minted token's scope
    secrets:
      APP_ID:
        required: false
      APP_PRIVATE_KEY:
        required: false

jobs:
  trivy-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Generate App token
        if: ${{ inputs.app-owner != '' }}
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ inputs.app-owner }}
          repositories: ${{ inputs.app-repositories }}

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.build-context }}
          file: ${{ inputs.dockerfile-path }}
          push: false
          load: true
          tags: localhost/${{ github.event.repository.name }}:pr-scan
          secrets: |
            GH_TOKEN=${{ steps.app-token.outputs.token }}

      - name: Trivy image scan (table)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: localhost/${{ github.event.repository.name }}:pr-scan
          format: 'table'
          severity: ${{ inputs.severity }}
          ignore-unfixed: true
          exit-code: '0'

      - name: Trivy image scan (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: localhost/${{ github.event.repository.name }}:pr-scan
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: ${{ inputs.severity }}
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload SARIF
        if: always() && hashFiles('trivy-image.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Count findings + maybe fail
        if: always() && hashFiles('trivy-image.sarif') != ''
        run: |
          count=$(jq '[.runs[].results[]] | length' trivy-image.sarif)
          echo "Trivy findings at ${{ inputs.severity }} severity: $count"
          if [ "${{ inputs.fail-on-findings }}" = "true" ] && [ "$count" -gt 0 ]; then
            echo "::error::Trivy image scan found $count vulnerabilities at severity ${{ inputs.severity }} or above."
            exit 1
          fi
