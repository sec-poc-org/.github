name: Reusable Nightly TruffleHog

on:
  workflow_call:
    inputs:
      trufflehog-extra-args:
        type: string
        default: '--only-verified'
        description: >
          Extra args passed to TruffleHog. Defaults to --only-verified for the production
          contract (any finding = real incident). Override to '' to scan for any
          pattern match (useful for ad-hoc audits and PoC testing). The action wrapper
          already passes --no-update internally, so do not include it here.
    secrets:
      SLACK_WEBHOOK_URL:
        required: false
        description: Optional Slack webhook for alerts on verified findings

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Surface the optional Slack webhook as an env var so it can be referenced in `if:` expressions
      # (GitHub Actions does not allow `secrets.*` directly in `if:`).
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        id: trufflehog
        uses: trufflesecurity/trufflehog@v3.83.0
        with:
          extra_args: ${{ inputs.trufflehog-extra-args }}
        continue-on-error: true

      - name: Notify Slack on verified finding
        if: ${{ steps.trufflehog.outcome == 'failure' && env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ env.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "TruffleHog found *verified* live secrets in ${{ github.repository }} — investigate at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      - name: Fail job on verified finding
        if: ${{ steps.trufflehog.outcome == 'failure' }}
        run: |
          echo "::error::TruffleHog found verified live secrets. See preceding step output."
          exit 1
