name: Reusable govulncheck

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        default: '.'
      go-version-file:
        type: string
        default: 'go.mod'
      app-owner:
        type: string
        default: ''
        description: GitHub org/user owning the App; leave empty to skip token minting
      app-repositories:
        type: string
        default: ''
        description: Newline-separated repos for the minted token's scope
    secrets:
      APP_ID:
        required: false
      APP_PRIVATE_KEY:
        required: false

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.working-directory }}/${{ inputs.go-version-file }}

      - name: Generate App token
        if: ${{ inputs.app-owner != '' }}
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ inputs.app-owner }}
          repositories: ${{ inputs.app-repositories }}

      - name: Configure git for private modules
        if: ${{ inputs.app-owner != '' }}
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        id: vulncheck
        continue-on-error: true
        run: govulncheck ./...

      - name: Run govulncheck (SARIF)
        if: always()
        continue-on-error: true
        run: govulncheck -format sarif ./... > govulncheck.sarif

      - name: Sanitize SARIF
        if: always() && hashFiles(format('{0}/govulncheck.sarif', inputs.working-directory)) != ''
        run: |
          jq '(.runs[].tool.driver.rules[]?.properties.tags) |= (if . then unique else . end)' \
            govulncheck.sarif > govulncheck.sanitized.sarif
          mv govulncheck.sanitized.sarif govulncheck.sarif

      - name: Upload SARIF
        if: always() && hashFiles(format('{0}/govulncheck.sarif', inputs.working-directory)) != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ inputs.working-directory }}/govulncheck.sarif
          category: govulncheck

      - name: Fail on findings
        if: ${{ steps.vulncheck.outcome == 'failure' }}
        run: exit 1
